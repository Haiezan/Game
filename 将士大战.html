                            const dx = enemy.x - bullet.x;
                            const dy = enemy.y - bullet.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < bullet.AOE) {
                                enemy.hp -= bullet.damage;
                                spawnExplosion(bullet.x, bullet.y, '255, 100, 0', 15);
                                impact = true;
                            }
                        });
                        // Check boss
                        if (boss) {
                            const dx = boss.x - bullet.x;
                            const dy = boss.y - bullet.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < bullet.AOE + 30) {
                                boss.hp -= bullet.damage;
                                spawnExplosion(bullet.x, bullet.y, '255, 100, 0', 20);
                                impact = true;
                            }
                        }
                        if (impact) {
                            bullet.hit = true;
                        }
                    }

                    // Laser - piercing, hits all enemies in path
                    if (bullet.type === 'laser' && bullet.piercing) {
                        enemies.forEach(enemy => {
                            if (enemy.isPig) return; // 猪不会被攻击
                            // Skip already pierced enemies
                            if (bullet.piercedEnemies && bullet.piercedEnemies.includes(enemy)) return;

                            const dx = enemy.x - bullet.x;
                            const dy = enemy.y - bullet.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 30) {
                                enemy.hp -= bullet.damage;
                                if (!bullet.piercedEnemies) bullet.piercedEnemies = [];
                                bullet.piercedEnemies.push(enemy);
                                spawnExplosion(bullet.x, bullet.y, '255, 20, 147', 10);
                            }
                        });
                        // Also damage boss
                        if (boss) {
                            const dx = boss.x - bullet.x;
                            const dy = boss.y - bullet.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 50) {
                                boss.hp -= bullet.damage;
                                spawnExplosion(bullet.x, bullet.y, '255, 20, 147', 15);
                            }
                        }
                    }
                }
            });

            bullets = bullets.filter(b => !b.hit && b.x > -50 && b.x < canvas.width + 50 && b.y > -50 && b.y < canvas.height + 50);
        }

        // Spawn boss
        function spawnBoss() {
            boss = {
                x: canvas.width + 60,
                y: canvas.height / 2,
                size: 80,
                hp: 5000,
                maxHp: 2500,
                phase: 1,
                speed: 1.5,
                damage: 50,
                lastAttack: frameCount,
                lastSpecial: frameCount,
                minions: []
            };
            bossHpContainer.classList.add('active');
            playSound('boss');

            // Spawn warning message
            spawnExplosion(canvas.width - 50, canvas.height / 2, '255, 0, 0', 30);
        }

        // Update boss
        function updateBoss() {
            if (!boss) return;

            // Determine phase based on HP percentage
            const hpPercent = (boss.hp / boss.maxHp) * 100;
            if (hpPercent > 60) {
                boss.phase = 1;
            } else if (hpPercent > 30) {
                boss.phase = 2;
            } else {
                boss.phase = 3;
            }

            // Move boss
            if (boss.x > canvas.width - 100) {
                boss.x -= boss.speed;
            }

            // Phase-specific attacks
            if (boss.phase === 1) {
                // Phase 1: Fan-shaped fireballs (every 90 frames)
                if (frameCount - boss.lastSpecial > 90) {
                    for (let i = -2; i <= 2; i++) {
                        const angle = Math.PI + i * 0.3;
                        enemyBullets.push({
                            x: boss.x,
                            y: boss.y,
                            vx: Math.cos(angle) * 4,
                            vy: Math.sin(angle) * 4,
                            size: 15,
                            color: '255, 100, 0',
                            damage: 15,
                            type: 'fireball'
                        });
                    }
                    boss.lastSpecial = frameCount;
                    playSound('shoot');
                }
            } else if (boss.phase === 2) {
                // Phase 2: Fireballs + purple ice minions (every 60 frames)
                if (frameCount - boss.lastSpecial > 60) {
                    // Fan fireballs
                    for (let i = -2; i <= 2; i++) {
                        const angle = Math.PI + i * 0.3;
                        enemyBullets.push({
                            x: boss.x,
                            y: boss.y,
                            vx: Math.cos(angle) * 5,
                            vy: Math.sin(angle) * 5,
                            size: 15,
                            color: '255, 100, 0',
                            damage: 15,
                            type: 'fireball'
                        });
                    }
                    // Spawn ice minion
                    boss.minions.push({
                        x: boss.x - 50,
                        y: Math.random() * canvas.height,
                        size: 25,
                        hp: 30,
                        speed: 2,
                        type: 'ice'
                    });
                    boss.lastSpecial = frameCount;
                    playSound('shoot');
                }

                // Update ice minions
                boss.minions = boss.minions.filter(minion => {
                    minion.x -= minion.speed;
                    // Check collision with soldiers
                    soldiers.forEach(soldier => {
                        const dx = soldier.x - minion.x;
                        const dy = soldier.y - minion.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 30) {
                            let damage = 20;
                            // Shield absorbs damage first
                            if (soldier.shield && soldier.shield > 0) {
                                const absorbed = Math.min(soldier.shield, damage);
                                soldier.shield -= absorbed;
                                damage -= absorbed;
                                spawnExplosion(soldier.x, soldier.y, '135, 206, 250', 5);
                                if (damage <= 0) {
                                    minion.hp = 0;
                                    return;
                                }
                            }
                            soldier.hp -= damage;
                            spawnExplosion(soldier.x, soldier.y, '150, 0, 255', 10);
                            minion.hp = 0;
                        }
                    });
                    return minion.x > -50 && minion.hp > 0;
                });
            } else if (boss.phase === 3) {
                // Phase 3: Firecracker explosion + circle fireballs (every 30 frames)
                if (frameCount - boss.lastSpecial > 30) {
                    // Firecracker warning (target random soldier) - 分散发射多个
                    for (let i = 0; i < 3; i++) {
                        const targetSoldier = soldiers[Math.floor(Math.random() * soldiers.length)];
                        if (targetSoldier) {
                            const angle = Math.atan2(targetSoldier.y - boss.y, targetSoldier.x - boss.x) + (Math.random() - 0.5) * 0.5;
                            const speed = 3 + Math.random() * 2;
                            enemyBullets.push({
                                x: boss.x,
                                y: boss.y,
                                targetX: targetSoldier.x + (Math.random() - 0.5) * 100,
                                targetY: targetSoldier.y + (Math.random() - 0.5) * 100,
                                vx: Math.cos(angle) * speed,
                                vy: Math.sin(angle) * speed,
                                size: 20,
                                color: '255, 200, 0',
                                damage: 20,
                                type: 'firecracker',
                                exploding: false
                            });
                        }
                    }
                    boss.lastSpecial = frameCount;
                    playSound('shoot');
                }
            }

            // Attack soldiers
            soldiers.forEach(soldier => {
                const dx = soldier.x - boss.x;
                const dy = soldier.y - boss.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 60 && frameCount - boss.lastAttack > 60) {
                    let damage = boss.damage;
                    // Shield absorbs damage first
                    if (soldier.shield && soldier.shield > 0) {
                        const absorbed = Math.min(soldier.shield, damage);
                        soldier.shield -= absorbed;
                        damage -= absorbed;
                        spawnExplosion(soldier.x, soldier.y, '135, 206, 250', 5);
                        if (damage <= 0) {
                            boss.lastAttack = frameCount;
                            return;
                        }
                    }
                    soldier.hp -= damage;
                    boss.lastAttack = frameCount;
                    spawnExplosion(soldier.x, soldier.y, '255, 0, 0', 10);
                    playSound('hit');
                }
            });

            // Update HP bar
            bossHpFill.style.width = hpPercent + '%';

            // Boss death
            if (boss.hp <= 0) {
                bossDefeated = true;
                score += 500;
                spawnExplosion(boss.x, boss.y, '255, 0, 0', 50);
                spawnExplosion(boss.x, boss.y, '255, 215, 0', 30);
                playSound('boss');
                boss = null;
                bossHpContainer.classList.remove('active');
                victory();
            }
        }

        // Check collisions with player (for collecting energy)
        function checkEnergyCollection(mouseX, mouseY) {
            // Check if clicking near energy blocks to collect
            energyBlocks = energyBlocks.filter(block => {
                const dx = mouseX - block.x;
                const dy = mouseY - block.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 40) {
                    energy++;
                    spawnExplosion(block.x, block.y, '0, 255, 0', 10);
                    playSound('collect');
                    return false;
                }
                return true;
            });

            // Auto collect when full
            if (energy >= 5) {
                energyCountEl.textContent = energy;
                soldierTypeHint.style.display = 'block';
                soldierTypeHint.textContent = '点击战场放置士兵';
            } else {
                energyCountEl.textContent = energy;
            }
        }

        // Place soldier
        function placeSoldier(x, y) {
            if (energy >= 5) {
                spawnSoldier(x, y);
                energy -= 5;
                energyCountEl.textContent = energy;
                if (energy < 5) {
                    soldierTypeHint.style.display = 'none';
                }
            }
        }

        // Update player HP bar
        function updatePlayerHpBar() {
            const hpPercent = (playerHp / maxPlayerHp) * 100;
            playerHpFill.style.width = hpPercent + '%';

            if (hpPercent > 60) {
                playerHpFill.style.background = '#ff6600';
            } else if (hpPercent > 30) {
                playerHpFill.style.background = '#ffaa00';
            } else {
                playerHpFill.style.background = '#ff3300';
            }
        }

        // Game over
        function gameOver() {
            gameState = 'gameover';
            finalTimeEl.textContent = gameTime;
            finalScoreEl.textContent = score;
            gameOverScreen.classList.add('active');
        }

        // Victory
        function victory() {
            gameState = 'victory';
            victoryTimeEl.textContent = gameTime;
            victoryScoreEl.textContent = score;
            victoryScreen.classList.add('active');
        }

        // Reset game
        function resetGame() {
            score = 0;
            energy = 0;
            gameTime = 0;
            frameCount = 0;
            playerHp = 100;
            bossSpawned = false;
            bossDefeated = false;

            energyBlocks = [];
            soldiers = [];
            enemies = [];
            bullets = [];
            enemyBullets = [];
            particles = [];
            boss = null;

            energyCountEl.textContent = '0';
            gameTimeEl.textContent = '0';
            scoreEl.textContent = '0';
            soldierCountEl.textContent = '0';
            soldierTypeHint.style.display = 'none';

            bossHpContainer.classList.remove('active');
            bossHpFill.style.width = '100%';
            updatePlayerHpBar();
        }

        // Main game loop
        function gameLoop() {
            drawBackground();

            if (gameState === 'playing') {
                frameCount++;

                // Update time every second
                if (frameCount % 60 === 0) {
                    gameTime++;
                    gameTimeEl.textContent = gameTime;
                }

                // Score increases over time
                if (frameCount % 60 === 0) {
                    score += 1;
                    scoreEl.textContent = score;
                }

                // Spawn energy blocks
                if (frameCount % 90 === 0) {
                    spawnEnergyBlock();
                }

                // Spawn enemies - difficulty scaling
                let spawnRate;
                if (gameTime < 60) {
                    // 前期 (0-60秒): 少量敌人
                    spawnRate = Math.max(180, 240 - gameTime * 2);
                } else if (gameTime < 100) {
                    // 中期 (60-100秒): 逐渐增加
                    spawnRate = Math.max(90, 180 - (gameTime - 60));
                } else {
                    // 后期 (100秒后BOSS出现): 敌人大量增加
                    spawnRate = Math.max(30, 60 - (gameTime - 100) * 0.5);
                }
                if (frameCount % Math.floor(spawnRate) === 0) {
                    spawnEnemy();
                }

                // Spawn boss at 100 seconds
                if (gameTime >= 100 && !bossSpawned && !bossDefeated) {
                    spawnBoss();
                    bossSpawned = true;
                }

                // Update
                updateEnergyBlocks();
                updateSoldiers();
                updateEnemies();
                updateBullets();
                updateEnemyBullets();
                updateBoss();

                // Update soldier count display
                soldierCountEl.textContent = soldiers.length;

                // Draw game objects
                drawEnergyBlocks();
                drawBullets();
                drawEnemyBullets();
                drawEnemies();
                drawBoss();
                drawSoldiers();
                drawParticles();

            } else if (gameState === 'gameover' || gameState === 'victory') {
                // Still draw objects in background
                drawEnergyBlocks();
                drawEnemies();
                drawBoss();
                drawSoldiers();
                drawParticles();
            }

            requestAnimationFrame(gameLoop);
        }

        // Input handling - add to game container
        document.querySelector('.game-container').addEventListener('click', (e) => {
            // 如果图鉴打开中，不触发游戏开始
            if (encyclopediaPanel.classList.contains('active')) {
                return;
            }
            if (gameState === 'start') {
                initAudio();
                gameState = 'playing';
                startScreen.classList.add('hidden');
            } else if (gameState === 'playing') {
                const rect = canvas.getBoundingClientRect();
                // 将点击坐标转换为画布内部坐标
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;

                if (energy >= 5) {
                    placeSoldier(x, y);
                } else {
                    checkEnergyCollection(x, y);
                }
            } else if (gameState === 'gameover' || gameState === 'victory') {
                gameOverScreen.classList.remove('active');
                victoryScreen.classList.remove('active');
                resetGame();
                gameState = 'playing';
            }
        });

        // Responsive canvas sizing
        function resizeCanvas() {
            const container = document.querySelector('.game-container');
            const maxWidth = 800;
            const maxHeight = 600;
            const aspectRatio = maxWidth / maxHeight;

            let width = Math.min(window.innerWidth - 20, maxWidth);
            let height = width / aspectRatio;

            if (height > window.innerHeight - 20) {
                height = window.innerHeight - 20;
                width = height * aspectRatio;
            }

            container.style.width = width + 'px';
            container.style.height = height + 'px';
            canvas.width = maxWidth;
            canvas.height = maxHeight;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
        }

        // 移动端触摸支持 - 使用wrapper捕获触摸
        document.querySelector('.game-wrapper').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'start') {
                initAudio();
                gameState = 'playing';
                startScreen.classList.add('hidden');
            } else if (gameState === 'playing') {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (touch.clientX - rect.left) * scaleX;
                const y = (touch.clientY - rect.top) * scaleY;

                if (energy >= 5) {
                    placeSoldier(x, y);
                } else {
                    checkEnergyCollection(x, y);
                }
            } else if (gameState === 'gameover' || gameState === 'victory') {
                gameOverScreen.classList.remove('active');
                victoryScreen.classList.remove('active');
                resetGame();
                gameState = 'playing';
            }
        }, { passive: false });

        // Encyclopedia system
        const encyclopediaPanel = document.getElementById('encyclopediaPanel');
        const encyclopediaContent = document.getElementById('encyclopediaContent');
        const encyclopediaClose = document.getElementById('encyclopediaClose');
        const prevPageBtn = document.getElementById('prevPage');
        const nextPageBtn = document.getElementById('nextPage');
        const pageIndicator = document.getElementById('pageIndicator');

        // 获取兵种速度映射
        const soldierSpeedMap = {
            'sword': 2.5, 'bow': 2.5, 'spear': 2.0, 'assassin': 3.0,
            'trebuchet': 1.5, 'collector': 3.5, 'slow': 1.8,
            'artillery': 2.0, 'machinegun': 2.0, 'laser': 2.0,
            'angel': 2.0, 'fairy': 2.0, 'horn': 2.0, 'healer': 2.0
        };

        // 获取兵种属性（动态从游戏代码获取）
        function getSoldierStats(type) {
            let hp = 30, damage = 10, range = 30, attackSpeed = 30;

            if (type === 'bow') {
                hp = 20; damage = 8; range = 200; attackSpeed = 45;
            } else if (type === 'spear') {
                hp = 40; damage = 12; range = 45; attackSpeed = 25;
            } else if (type === 'assassin') {
                hp = 20; damage = 15; range = 120; attackSpeed = 15;
            } else if (type === 'trebuchet') {
                hp = 80; damage = 25; range = 300; attackSpeed = 150;
            } else if (type === 'collector') {
                hp = 35; damage = 5; range = 60; attackSpeed = 20;
            } else if (type === 'slow') {
                hp = 50; damage = 3; range = 80; attackSpeed = 60;
            } else if (type === 'artillery') {
                hp = 120; damage = 100; range = 500; attackSpeed = 480;
            } else if (type === 'machinegun') {
                hp = 30; damage = 3; range = 150; attackSpeed = 5;
            } else if (type === 'laser') {
                hp = 80; damage = 150; range = 600; attackSpeed = 1200;
            } else if (type === 'angel') {
                hp = 50; damage = 0; range = 100; attackSpeed = 180;
            } else if (type === 'fairy') {
                hp = 60; damage = 0; range = 200; attackSpeed = 600;
            } else if (type === 'horn') {
                hp = 45; damage = 0; range = 120; attackSpeed = 240;
            } else if (type === 'healer') {
                hp = 40; damage = 0; range = 100; attackSpeed = 180;
            }

            return { hp, damage, range, attackSpeed };
        }

        // 兵种描述映射
        const soldierDescMap = {
            'sword': '基础近战兵种，攻击力中等，血量中等',
            'bow': '远程攻击兵种，射程远，攻击力较低',
            'spear': '防御型兵种，血量高，攻击距离中等',
            'assassin': '高爆发兵种，伤害高但血量低',
            'trebuchet': '超远程兵种，伤害极高，攻击间隔长',
            'collector': '自动收集周围能量，血量中等',
            'slow': '范围攻击，减速敌人50%',
            'artillery': '8秒蓄力发射高伤害炮弹，范围伤害',
            'machinegun': '持续发射三行子弹，攻速极快',
            'laser': '20秒蓄力发射全图穿透炮弹',
            'angel': '给周围友军加护盾，每3秒生效，护盾上限50点',
            'fairy': '召唤大肥猪追击敌人，10秒CD，猪爆炸造成300范围伤害',
            'horn': '吹号角增强友军50%伤害和50%攻速，持续3秒',
            'healer': '每3秒回复周围友军20点血量'
        };

        // 兵种图标映射
        const soldierIconMap = {
            'sword': '⚔️', 'bow': '🏹', 'spear': '🔱', 'assassin': '🗡️',
            'trebuchet': '⚙️', 'collector': '🎒', 'slow': '❄️',
            'artillery': '💣', 'machinegun': '🔫', 'laser': '⚡',
            'angel': '👼', 'fairy': '🧚', 'horn': '📯', 'healer': '💊'
        };

        // 兵种名称映射
        const soldierNameMap = {
            'sword': '刀兵', 'bow': '弓兵', 'spear': '枪兵', 'assassin': '刺客',
            'trebuchet': '投石车', 'collector': '收集兵', 'slow': '减速兵',
            'artillery': '炮兵', 'machinegun': '机枪兵', 'laser': '激光兵',
            'angel': '天使', 'fairy': '小仙女', 'horn': '号角兵', 'healer': '回复兵'
        };

        // 动态生成兵种数据
        const soldierTypes = ['sword', 'bow', 'spear', 'assassin', 'trebuchet', 'collector', 'slow', 'artillery', 'machinegun', 'laser', 'angel', 'fairy', 'horn', 'healer'];

        function generateSoldiersData() {
            return soldierTypes.map(type => {
                const stats = getSoldierStats(type);
                return {
                    icon: soldierIconMap[type],
                    name: soldierNameMap[type],
                    hp: stats.hp,
                    damage: stats.damage,
                    range: stats.range,
                    speed: soldierSpeedMap[type],
                    attackSpeed: stats.attackSpeed,
                    desc: soldierDescMap[type]
                };
            });
        }

        let soldiersData = generateSoldiersData();
        let currentPage = 0;
        const totalPages = soldiersData.length;

        function renderEncyclopedia() {
            // 每次渲染时重新生成数据，确保反映最新属性
            soldiersData = generateSoldiersData();
            const soldier = soldiersData[currentPage];
            encyclopediaContent.innerHTML = `
                <div class="encyclopedia-soldier-full">
                    <div class="encyclopedia-icon-large">${soldier.icon}</div>
                    <div class="encyclopedia-info-full">
                        <div class="encyclopedia-name-large">${soldier.name}</div>
                        <div class="encyclopedia-stats">
                            <div>生命: ${soldier.hp}</div>
                            <div>伤害: ${soldier.damage}</div>
                            <div>射程: ${soldier.range}</div>
                            <div>速度: ${soldier.speed}</div>
                        </div>
                        <div class="encyclopedia-desc-large">${soldier.desc}</div>
                    </div>
                </div>
            `;
            pageIndicator.textContent = `${currentPage + 1}/${totalPages}`;
        }

        function showEncyclopedia() {
            encyclopediaPanel.classList.add('active');
            renderEncyclopedia();
        }

        function hideEncyclopedia() {
            encyclopediaPanel.classList.remove('active');
        }

        function nextPage() {
            currentPage = (currentPage + 1) % totalPages;
            renderEncyclopedia();
        }

        function prevPage() {
            currentPage = (currentPage - 1 + totalPages) % totalPages;
            renderEncyclopedia();
        }

        // Keyboard 'a' to open encyclopedia
        document.addEventListener('keydown', (e) => {
            if (e.key === 'a' || e.key === 'A') {
                if ((gameState === 'playing' || gameState === 'start') && !encyclopediaPanel.classList.contains('active')) {
                    showEncyclopedia();
                }
            } else if (e.key === 'Escape') {
                hideEncyclopedia();
            }
        });

        // Close button
        encyclopediaClose.addEventListener('click', hideEncyclopedia);

        // Navigation buttons
        prevPageBtn.addEventListener('click', prevPage);
        nextPageBtn.addEventListener('click', nextPage);

        // Click outside to close
        encyclopediaPanel.addEventListener('click', (e) => {
            if (e.target === encyclopediaPanel) {
                hideEncyclopedia();
            }
        });

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Start game loop
        gameLoop();
    </script>
</body>
</html>
